<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>達成目標時間推算器</title>
    <!-- 引入 Chart.js 用於繪製折線圖 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #1e293b;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --warning-color: #ef4444;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .calculator-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 750px;
            padding: 32px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            text-align: center;
            font-size: 24px;
            margin-bottom: 24px;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 500px) {
            .grid-inputs {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: var(--primary-color);
            margin-bottom: 6px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            border-color: var(--accent-color);
            outline: none;
        }
        
        .helper-text {
            color: #94a3b8;
            font-size: 12px;
            margin-top: 4px;
        }

        .range-container {
            grid-column: 1 / -1;
            background: #f1f5f9;
            padding: 16px;
            border-radius: 10px;
        }

        .value-display {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-color);
            background: #e0f2fe;
            padding: 4px 12px;
            border-radius: 20px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #cbd5e1;
            border-radius: 4px;
            outline: none;
            -webkit-appearance: none;
            margin-top: 10px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.4);
        }

        .result-section {
            background-color: #f8fafc;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            border: 2px solid #e2e8f0;
            border-top: 5px solid var(--success-color);
            position: relative;
        }

        .result-title {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .result-value {
            font-size: 38px;
            font-weight: 800;
            color: var(--success-color);
            margin-bottom: 16px;
        }

        .warning-tag {
            display: none;
            background-color: #fee2e2;
            color: #b91c1c;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .breakdown {
            display: flex;
            justify-content: space-around;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }

        .breakdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .breakdown-value {
            font-weight: 700;
            color: var(--primary-color);
            margin-top: 4px;
            font-size: 16px;
        }

        .chart-container {
            margin-top: 24px;
            width: 100%;
            height: 320px;
        }
        
        .disclaimer {
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <h2>達成目標時間推算器 (Coast FIRE)</h2>

        <div class="input-section">
            <div class="grid-inputs">
                <div class="input-group">
                    <label for="targetAmount">1. 目標總金額 (萬)</label>
                    <input type="number" id="targetAmount" value="1000" min="10" step="10">
                </div>
                
                <div class="input-group">
                    <label for="initialAmount">2. 已存準備金 (萬)</label>
                    <input type="number" id="initialAmount" value="100" min="0" step="10">
                </div>

                <div class="input-group">
                    <label for="monthlyAmount">3. 每月定期定額 (千)</label>
                    <input type="number" id="monthlyAmount" value="10" min="0" step="1">
                </div>

                <div class="input-group">
                    <label for="stopYear">4. 幾年後停止投入 (年)</label>
                    <input type="number" id="stopYear" value="10" min="0" step="1">
                    <div class="helper-text">填 0 代表不停止，持續扣款到達標</div>
                </div>
            </div>

            <div class="range-container">
                <div class="input-header">
                    <label for="rate">5. 預估年化報酬率</label>
                    <span class="value-display" id="rateDisplay">7.0 %</span>
                </div>
                <input type="range" id="rate" min="1" max="15" value="7" step="0.5">
            </div>
        </div>

        <div class="result-section">
            <div class="warning-tag" id="overLimitWarning">
                ⚠️ 依目前設定，達成目標需超過 40 年或無法達成。<br>圖表已限制顯示至最高 40 年的預估結果。
            </div>

            <div class="result-title">達成目標預估總共需要：</div>
            <div class="result-value" id="timeResult">0 年 0 個月</div>
            
            <div class="breakdown">
                <div class="breakdown-item">
                    <span>達標時總投入本金</span>
                    <span class="breakdown-value" id="totalPrincipal">0 元</span>
                </div>
                <div class="breakdown-item">
                    <span>達標時總獲利</span>
                    <span class="breakdown-value" id="totalInterest" style="color: var(--accent-color);">0 元</span>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="growthChart"></canvas>
        </div>
        
        <div class="disclaimer">
            *註：本試算採用期初投入法，並假設停止投入後資金仍保留於市場內持續依報酬率滾動。
        </div>
    </div>

    <script>
        const elTargetAmount = document.getElementById('targetAmount');
        const elInitialAmount = document.getElementById('initialAmount');
        const elMonthlyAmount = document.getElementById('monthlyAmount');
        const elStopYear = document.getElementById('stopYear');
        const elRate = document.getElementById('rate');
        
        const elRateDisplay = document.getElementById('rateDisplay');
        const elTimeResult = document.getElementById('timeResult');
        const elTotalPrincipal = document.getElementById('totalPrincipal');
        const elTotalInterest = document.getElementById('totalInterest');
        const elWarning = document.getElementById('overLimitWarning');

        let growthChart = null;

        const formatMoney = (num) => {
            return Math.round(num).toLocaleString('zh-TW');
        };

        function updateChart(displayYears, initial, pmt, annualRate, stopYearSetting, isCapped) {
            const labels = [];
            const assetData = []; // 預估總資產
            const principalData = []; // 累積投入本金的陣列
            const profitData = []; // 累積獲利(複利)
            
            const monthlyRate = annualRate / 12;

            // 第 0 年 (現在)
            labels.push('現在');
            assetData.push(initial);
            profitData.push(0); 
            principalData.push(initial);

            for (let i = 1; i <= displayYears; i++) {
                labels.push(`第 ${i} 年`);
                
                const monthsPassed = i * 12;
                let currentPrincipal = 0;
                let currentTotal = 0;

                // 判斷是否還在定期定額期間內
                if (i <= stopYearSetting || stopYearSetting === Infinity) {
                    currentPrincipal = initial + (pmt * monthsPassed);
                    if (annualRate === 0) {
                        currentTotal = currentPrincipal;
                    } else {
                        const pvGrowth = initial * Math.pow(1 + monthlyRate, monthsPassed);
                        const pmtGrowth = pmt * ((Math.pow(1 + monthlyRate, monthsPassed) - 1) / monthlyRate) * (1 + monthlyRate);
                        currentTotal = pvGrowth + pmtGrowth;
                    }
                } else {
                    // 已經停止定期定額，本金不再增加，只靠市場滾動
                    const exactStopMonths = stopYearSetting * 12;
                    currentPrincipal = initial + (pmt * exactStopMonths); 

                    let fvAtStop = 0;
                    if (annualRate === 0) {
                        fvAtStop = currentPrincipal;
                        currentTotal = fvAtStop; 
                    } else {
                        const pvGrowth = initial * Math.pow(1 + monthlyRate, exactStopMonths);
                        const pmtGrowth = pmt * ((Math.pow(1 + monthlyRate, exactStopMonths) - 1) / monthlyRate) * (1 + monthlyRate);
                        fvAtStop = pvGrowth + pmtGrowth; 

                        const monthsAfterStop = monthsPassed - exactStopMonths;
                        currentTotal = fvAtStop * Math.pow(1 + monthlyRate, monthsAfterStop); 
                    }
                }

                const currentProfit = currentTotal - currentPrincipal;
                assetData.push(Math.round(currentTotal));
                profitData.push(Math.round(currentProfit));
                principalData.push(Math.round(currentPrincipal)); // 寫入每年的本金資料
            }

            const ctx = document.getElementById('growthChart').getContext('2d');

            if (growthChart) {
                growthChart.destroy();
            }

            growthChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '預估總資產',
                            data: assetData,
                            borderColor: '#10b981', // 綠色
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.3,
                            pointRadius: 1,
                            pointHoverRadius: 5
                        },
                        {
                            label: '累積投入本金',
                            data: principalData,
                            borderColor: '#f59e0b', // 橘黃色
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            fill: false,
                            tension: 0.3,
                            pointRadius: 1,
                            pointHoverRadius: 5
                        },
                        {
                            label: '累積獲利(複利)',
                            data: profitData,
                            borderColor: '#3b82f6', // 藍色
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0.3,
                            pointRadius: 1,
                            pointHoverRadius: 5
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) {
                                        label += new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', maximumFractionDigits: 0 }).format(context.parsed.y);
                                    }
                                    return label;
                                }
                            }
                        },
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return (value / 10000) + ' 萬';
                                }
                            }
                        }
                    }
                }
            });
        }

        function calculate() {
            // 將單位「萬」與「千」轉換回「元」計算
            const target = parseFloat(elTargetAmount.value) * 10000;
            const initial = (parseFloat(elInitialAmount.value) || 0) * 10000;
            const pmt = (parseFloat(elMonthlyAmount.value) || 0) * 1000;
            const annualRate = parseFloat(elRate.value) / 100;
            
            const rawStopYear = parseFloat(elStopYear.value);
            const stopYearSetting = (isNaN(rawStopYear) || rawStopYear <= 0) ? Infinity : rawStopYear;
            const stopMonths = stopYearSetting === Infinity ? Infinity : stopYearSetting * 12;

            elRateDisplay.textContent = `${(annualRate * 100).toFixed(1)} %`;

            if (isNaN(target) || target <= 0) return;

            let r = annualRate / 12;
            let totalMonths = 0;
            let continuousMonths = 0; 

            // 先計算如果不停止扣款，達標需要多久
            if (target <= initial) {
                continuousMonths = 0;
            } else if (annualRate === 0) {
                continuousMonths = pmt > 0 ? (target - initial) / pmt : Infinity;
            } else {
                const factor = pmt * (1 + r) / r;
                const num = target + factor;
                const den = initial + factor;
                if (den <= 0 || num <= 0) {
                    continuousMonths = Infinity;
                } else {
                    continuousMonths = Math.log(num / den) / Math.log(1 + r);
                }
            }

            if (continuousMonths <= stopMonths) {
                // 在計畫停止扣款之前就達標了
                totalMonths = continuousMonths;
            } else {
                // 停止扣款後尚未達標，剩餘缺口靠複利滾動
                if (annualRate === 0) {
                    totalMonths = Infinity; 
                } else {
                    const fvStop = initial * Math.pow(1+r, stopMonths) + pmt * ((Math.pow(1+r, stopMonths) - 1) / r) * (1+r);
                    
                    if (fvStop >= target) {
                        totalMonths = stopMonths;
                    } else {
                        const remainingMonths = Math.log(target / fvStop) / Math.log(1 + r);
                        totalMonths = stopMonths + remainingMonths;
                    }
                }
            }

            let displayYears = 0;
            let finalPrincipal = 0;
            let finalTotal = target;
            let isCapped = false;
            
            // 防呆上限
            const MAX_YEARS = 40; 
            const MAX_MONTHS = MAX_YEARS * 12;

            if (totalMonths === Infinity || totalMonths > MAX_MONTHS) {
                isCapped = true;
                displayYears = MAX_YEARS;
                elWarning.style.display = 'block';
                elTimeResult.textContent = `超過 ${MAX_YEARS} 年`;
                elTimeResult.style.color = 'var(--warning-color)';
                
                if (MAX_MONTHS <= stopMonths) {
                    finalPrincipal = initial + (pmt * MAX_MONTHS);
                    finalTotal = (initial * Math.pow(1 + r, MAX_MONTHS)) + (pmt * ((Math.pow(1 + r, MAX_MONTHS) - 1) / r) * (1 + r));
                } else {
                    finalPrincipal = initial + (pmt * stopMonths);
                    const fvStop = (initial * Math.pow(1 + r, stopMonths)) + (pmt * ((Math.pow(1 + r, stopMonths) - 1) / r) * (1 + r));
                    finalTotal = fvStop * Math.pow(1 + r, MAX_MONTHS - stopMonths);
                }
            } else {
                isCapped = false;
                elWarning.style.display = 'none';
                elTimeResult.style.color = 'var(--success-color)';
                
                const calcYears = Math.floor(totalMonths / 12);
                const calcMonths = Math.ceil(totalMonths % 12); 
                
                if (calcMonths === 12) {
                    elTimeResult.textContent = `${calcYears + 1} 年 0 個月`;
                    displayYears = calcYears + 1;
                } else {
                    elTimeResult.textContent = `${calcYears} 年 ${calcMonths} 個月`;
                    displayYears = Math.ceil(totalMonths / 12); 
                }
                
                if (totalMonths <= stopMonths) {
                    finalPrincipal = initial + (pmt * totalMonths);
                } else {
                    finalPrincipal = initial + (pmt * stopMonths);
                }
            }

            const finalProfit = finalTotal - finalPrincipal;
            elTotalPrincipal.textContent = formatMoney(finalPrincipal) + ' 元';
            elTotalInterest.textContent = formatMoney(finalProfit) + ' 元';

            displayYears = Math.max(1, Math.min(displayYears, MAX_YEARS));
            updateChart(displayYears, initial, pmt, annualRate, stopYearSetting, isCapped);
        }

        elTargetAmount.addEventListener('input', calculate);
        elInitialAmount.addEventListener('input', calculate);
        elMonthlyAmount.addEventListener('input', calculate);
        elStopYear.addEventListener('input', calculate);
        elRate.addEventListener('input', calculate);

        calculate();
    </script>
</body>
</html>
