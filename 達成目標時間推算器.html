<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>達成目標時間推算器</title>
    <!-- 引入 Chart.js 用於繪製折線圖 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #1e293b;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --warning-color: #ef4444;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .calculator-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 700px;
            padding: 32px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            text-align: center;
            font-size: 24px;
            margin-bottom: 24px;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 500px) {
            .grid-inputs {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: var(--primary-color);
        }

        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        /* 範圍滑桿的樣式 */
        .range-container {
            grid-column: 1 / -1; /* 佔滿整行 */
            background: #f1f5f9;
            padding: 16px;
            border-radius: 10px;
        }

        .value-display {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-color);
            background: #e0f2fe;
            padding: 4px 12px;
            border-radius: 20px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #cbd5e1;
            border-radius: 4px;
            outline: none;
            -webkit-appearance: none;
            margin-top: 10px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.4);
        }

        .result-section {
            background-color: #f8fafc;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            border: 2px solid #e2e8f0;
            border-top: 5px solid var(--success-color);
            position: relative;
        }

        .result-title {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .result-value {
            font-size: 38px;
            font-weight: 800;
            color: var(--success-color);
            margin-bottom: 16px;
        }

        .warning-tag {
            display: none;
            background-color: #fee2e2;
            color: #b91c1c;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .breakdown {
            display: flex;
            justify-content: space-around;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }

        .breakdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .breakdown-value {
            font-weight: 700;
            color: var(--primary-color);
            margin-top: 4px;
            font-size: 16px;
        }

        .chart-container {
            margin-top: 24px;
            width: 100%;
            height: 320px;
        }
        
        .disclaimer {
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
            margin-top: 16px;
        }

    </style>
</head>
<body>

    <div class="calculator-card">
        <h2>達成目標時間推算器</h2>

        <div class="input-section">
            <div class="grid-inputs">
                <div class="input-group">
                    <label for="targetAmount">1. 目標總金額 (萬)</label>
                    <input type="number" id="targetAmount" value="1000" min="10" step="10">
                </div>
                
                <div class="input-group">
                    <label for="initialAmount">2. 已存準備金 (萬)</label>
                    <input type="number" id="initialAmount" value="100" min="0" step="10">
                </div>

                <div class="input-group" style="grid-column: 1 / -1;">
                    <label for="monthlyAmount">3. 未來每月定期定額 (千)</label>
                    <input type="number" id="monthlyAmount" value="10" min="0" step="1">
                </div>
            </div>

            <div class="range-container">
                <div class="input-header">
                    <label for="rate">4. 預估年化報酬率</label>
                    <span class="value-display" id="rateDisplay">7.0 %</span>
                </div>
                <input type="range" id="rate" min="1" max="15" value="7" step="0.5">
            </div>
        </div>

        <div class="result-section">
            <div class="warning-tag" id="overLimitWarning">
                ⚠️ 依目前設定，達成目標需超過 30 年。<br>圖表已限制顯示至第 30 年的預估結果。
            </div>

            <div class="result-title">達成目標預估還需要：</div>
            <div class="result-value" id="timeResult">0 年 0 個月</div>
            
            <div class="breakdown">
                <div class="breakdown-item">
                    <span>達標時總投入本金</span>
                    <span class="breakdown-value" id="totalPrincipal">0 元</span>
                </div>
                <div class="breakdown-item">
                    <span>達標時總獲利</span>
                    <span class="breakdown-value" id="totalInterest" style="color: var(--accent-color);">0 元</span>
                </div>
            </div>
        </div>

        <!-- 曲線圖表區塊 -->
        <div class="chart-container">
            <canvas id="growthChart"></canvas>
        </div>
        
        <div class="disclaimer">
            *註：本試算採用期初投入法（每月一日投入），且將利息即時滾入本金計算。實際投資會有市場波動，本圖表為長期趨勢之數學推演。
        </div>
    </div>

    <script>
        // 取得 DOM 元素
        const elTargetAmount = document.getElementById('targetAmount');
        const elInitialAmount = document.getElementById('initialAmount');
        const elMonthlyAmount = document.getElementById('monthlyAmount');
        const elRate = document.getElementById('rate');
        
        const elRateDisplay = document.getElementById('rateDisplay');
        const elTimeResult = document.getElementById('timeResult');
        const elTotalPrincipal = document.getElementById('totalPrincipal');
        const elTotalInterest = document.getElementById('totalInterest');
        const elWarning = document.getElementById('overLimitWarning');

        let growthChart = null; // 儲存圖表實例

        // 格式化數字為貨幣格式
        const formatMoney = (num) => {
            return Math.round(num).toLocaleString('zh-TW');
        };

        // 繪製或更新圖表
        function updateChart(displayYears, initial, pmt, annualRate, isCapped) {
            const labels = [];
            const assetData = [];
            const profitData = [];
            
            const monthlyRate = annualRate / 12;

            // 包含第 0 年 (起始點)
            labels.push('現在');
            assetData.push(initial);
            profitData.push(0); 

            for (let i = 1; i <= displayYears; i++) {
                labels.push(`第 ${i} 年`);
                
                const monthsPassed = i * 12;
                const currentPrincipal = initial + (pmt * monthsPassed);
                
                let currentTotal = 0;
                if (annualRate === 0) {
                    currentTotal = currentPrincipal;
                } else {
                    // FV = PV*(1+r)^n + PMT*(1+r)*(((1+r)^n - 1) / r)
                    const pvGrowth = initial * Math.pow(1 + monthlyRate, monthsPassed);
                    const pmtGrowth = pmt * ((Math.pow(1 + monthlyRate, monthsPassed) - 1) / monthlyRate) * (1 + monthlyRate);
                    currentTotal = pvGrowth + pmtGrowth;
                }

                const currentProfit = currentTotal - currentPrincipal;

                assetData.push(Math.round(currentTotal));
                profitData.push(Math.round(currentProfit));
            }

            const ctx = document.getElementById('growthChart').getContext('2d');

            if (growthChart) {
                growthChart.destroy();
            }

            // 選項A：累積獲利 vs 總資產
            growthChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '預估總資產',
                            data: assetData,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.3,
                            pointRadius: 1,
                            pointHoverRadius: 5
                        },
                        {
                            label: '累積總獲利 (複利)',
                            data: profitData,
                            borderColor: '#3b82f6',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            borderDash: [5, 5], // 虛線區隔
                            fill: false,
                            tension: 0.3,
                            pointRadius: 1,
                            pointHoverRadius: 5
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) {
                                        label += new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', maximumFractionDigits: 0 }).format(context.parsed.y);
                                    }
                                    return label;
                                }
                            }
                        },
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return (value / 10000) + ' 萬';
                                }
                            }
                        }
                    }
                }
            });
        }

        // 主要計算邏輯
        function calculate() {
            // 將輸入單位（萬、千）轉換回基本單位（元）進行計算
            const target = parseFloat(elTargetAmount.value) * 10000;
            const initial = (parseFloat(elInitialAmount.value) || 0) * 10000;
            const pmt = (parseFloat(elMonthlyAmount.value) || 0) * 1000;
            const annualRate = parseFloat(elRate.value) / 100;

            elRateDisplay.textContent = `${(annualRate * 100).toFixed(1)} %`;

            // 防呆處理
            if (isNaN(target) || target <= 0) return;

            let totalMonths = 0;
            const r = annualRate / 12;

            if (target <= initial) {
                totalMonths = 0;
            } else if (annualRate === 0) {
                if (pmt <= 0) totalMonths = Infinity;
                else totalMonths = (target - initial) / pmt;
            } else {
                // 解財務期初年金方程式反推 n (期數)
                // factor = PMT * (1+r) / r
                // (Target + factor) / (PV + factor) = (1+r)^n
                const factor = pmt * (1 + r) / r;
                const numerator = target + factor;
                const denominator = initial + factor;
                
                if (denominator <= 0 || numerator <= 0) {
                    totalMonths = Infinity;
                } else {
                    totalMonths = Math.log(numerator / denominator) / Math.log(1 + r);
                }
            }

            let displayYears = 0;
            let finalPrincipal = 0;
            let finalTotal = target;
            let isCapped = false;

            if (totalMonths === Infinity || totalMonths > 360) {
                // 超過 30 年 (360 個月) 的防呆處理
                isCapped = true;
                displayYears = 30;
                elWarning.style.display = 'block';
                elTimeResult.textContent = '超過 30 年';
                elTimeResult.style.color = 'var(--warning-color)';
                
                // 計算 30 年後的實際數值
                const maxMonths = 360;
                finalPrincipal = initial + (pmt * maxMonths);
                finalTotal = (initial * Math.pow(1 + r, maxMonths)) + (pmt * ((Math.pow(1 + r, maxMonths) - 1) / r) * (1 + r));
            } else {
                // 正常達標
                isCapped = false;
                elWarning.style.display = 'none';
                elTimeResult.style.color = 'var(--success-color)';
                
                const calcYears = Math.floor(totalMonths / 12);
                const calcMonths = Math.ceil(totalMonths % 12); // 無條件進位到整數月
                
                // 處理進位到 12 個月的狀況
                if (calcMonths === 12) {
                    elTimeResult.textContent = `${calcYears + 1} 年 0 個月`;
                    displayYears = calcYears + 1;
                } else {
                    elTimeResult.textContent = `${calcYears} 年 ${calcMonths} 個月`;
                    displayYears = Math.ceil(totalMonths / 12); // 圖表 X 軸取完整年份
                }
                
                finalPrincipal = initial + (pmt * totalMonths);
                // finalTotal 直接使用 Target，因為這是達標的瞬間
            }

            // 更新數字結果
            const finalProfit = finalTotal - finalPrincipal;
            elTotalPrincipal.textContent = formatMoney(finalPrincipal) + ' 元';
            elTotalInterest.textContent = formatMoney(finalProfit) + ' 元';

            // 更新圖表 (最少畫 1 年，最多畫 30 年)
            displayYears = Math.max(1, Math.min(displayYears, 30));
            updateChart(displayYears, initial, pmt, annualRate, isCapped);
        }

        // 綁定事件監聽器
        elTargetAmount.addEventListener('input', calculate);
        elInitialAmount.addEventListener('input', calculate);
        elMonthlyAmount.addEventListener('input', calculate);
        elRate.addEventListener('input', calculate);

        // 初始計算一次
        calculate();
    </script>
</body>
</html>
